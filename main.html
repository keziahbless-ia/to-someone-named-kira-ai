<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0c0c1a 0%, #1a0033 25%, #2d1b69 50%, #0f0f23 100%);
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #f0e6ff;
            overflow: hidden;
            position: relative;
        }

        /* Floating stars/particles */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .star:nth-child(1) { width: 3px; height: 3px; top: 20%; left: 10%; animation-delay: 0s; }
        .star:nth-child(2) { width: 2px; height: 2px; top: 60%; left: 20%; animation-delay: 1s; }
        .star:nth-child(3) { width: 4px; height: 4px; top: 80%; left: 80%; animation-delay: 2s; }
        .star:nth-child(4) { width: 2px; height: 2px; top: 30%; left: 90%; animation-delay: 3s; }
        .star:nth-child(5) { width: 3px; height: 3px; top: 10%; left: 70%; animation-delay: 4s; }
        .star:nth-child(6) { width: 1px; height: 1px; top: 70%; left: 5%; animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 1; }
        }

        .container {
            text-align: center;
            z-index: 10;
            max-width: 90%;
            padding: 20px;
        }

        .poem {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.5s forwards;
            line-height: 1.4;
        }

        .input-group {
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.8s forwards;
        }

        .input-label {
            display: block;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            margin-bottom: 0.8rem;
            color: #d4c4fb;
            font-style: italic;
        }

        #nicknameInput {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 12px 20px;
            font-size: 1.1rem;
            color: #fff;
            width: 100%;
            max-width: 280px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            font-family: inherit;
        }

        #nicknameInput::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        #nicknameInput:focus {
            outline: none;
            border-color: #a78bfa;
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.4);
            background: rgba(255, 255, 255, 0.15);
        }

        .submit-btn {
            background: linear-gradient(45deg, #a78bfa, #ec4899);
            border: none;
            border-radius: 30px;
            padding: 12px 30px;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(167, 139, 250, 0.3);
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeInUp 1s ease-out 1s forwards;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(167, 139, 250, 0.5);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .message {
            font-size: clamp(1rem, 3.5vw, 1.3rem);
            margin-top: 1rem;
            min-height: 1.5rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }

        .success {
            color: #10b981;
            animation: fadeInGlow 0.8s ease-out forwards;
        }

        .error {
            color: #f59e0b;
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .music-container {
            opacity: 0;
            transition: opacity 1s ease;
            margin-top: 1rem;
        }

        .music-playing {
            opacity: 1;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInGlow {
            0% { opacity: 0; transform: translateY(10px) scale(0.9); }
            50% { opacity: 1; transform: translateY(-5px) scale(1.05); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="stars">
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
    </div>

    <div class="container">
        <div class="poem">"some pages only open for the right person."</div>
        
        <div class="input-group">
            <label class="input-label" for="nicknameInput">type my nickname</label>
            <input type="text" id="nicknameInput" placeholder="whisper it here..." autocomplete="off">
            <button class="submit-btn" onclick="checkNickname()">unlock</button>
        </div>

        <div class="message" id="message"></div>
        
        <div class="music-container" id="musicContainer">
            <audio id="backgroundMusic" loop>
                <source src="song.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>
    </div>

    <script>
        // EASY TO CHANGE: Set your secret nickname here
        const SECRET_NICKNAME = "kei"; // Change this to whatever you want!

        const nicknameInput = document.getElementById('nicknameInput');
        const messageEl = document.getElementById('message');
        const music = document.getElementById('backgroundMusic');
        const musicContainer = document.getElementById('musicContainer');
        const submitBtn = document.querySelector('.submit-btn');

        function checkNickname() {
            const input = nicknameInput.value.trim().toLowerCase();
            
            if (input === SECRET_NICKNAME.toLowerCase()) {
                // Success!
                messageEl.textContent = "you found it.";
                messageEl.className = 'message success';
                
                // Start music with fade-in
                music.volume = 0;
                music.play().then(() => {
                    // Fade in music volume
                    const fadeIn = setInterval(() => {
                        if (music.volume < 0.7) {
                            music.volume += 0.05;
                        } else {
                            clearInterval(fadeIn);
                        }
                    }, 100);
                    
                    // Show music container
                    musicContainer.classList.add('music-playing');
                }).catch(e => console.log('Autoplay prevented'));
                
                // Visual feedback
                submitBtn.style.opacity = '0';
                nicknameInput.style.opacity = '0';
                
            } else {
                // Gentle error
                messageEl.textContent = "hmm… try again.";
                messageEl.className = 'message error';
                nicknameInput.value = '';
                nicknameInput.focus();
            }
        }

        // Allow Enter key to submit
        nicknameInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkNickname();
            }
        });

        // Focus input on load
        window.addEventListener('load', () => {
            nicknameInput.focus();
        });

        // Prevent form submission on mobile keyboards
        nicknameInput.addEventListener('submit', (e) => e.preventDefault());
    </script>
</body>
</html>
